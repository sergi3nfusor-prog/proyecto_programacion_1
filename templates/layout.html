<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Zone | Dark Luxury Tech</title>
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="particles-bg"></div>
    
    <nav class="global-nav">
        <a href="{{ url_for('index') }}" class="brand-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Sport Zone Logo" onerror="this.src='https://via.placeholder.com/40x40/00FFA3/0B0F19?text=SZ'">
            Sport<span>Zone</span>
        </a>
        <ul class="nav-links">
            <li><a href="{{ url_for('index') }}">Inicio</a></li>
            <li><a href="{{ url_for('productos') }}">Catálogo</a></li>
            <li><a href="{{ url_for('club') }}">Club Membresías</a></li>
            <li><a href="{{ url_for('ofertas') }}">Ofertas</a></li>
            <li><a href="{{ url_for('sedes') }}">Sedes</a></li>
        </ul>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="global-footer" style="text-align: center; padding: 2rem; border-top: 1px solid var(--glass-border); margin-top: 3rem;">
        <p><span class="glitch-text" data-text="© 2026 Sport Zone" style="font-weight: 800; color: var(--accent-color);">© 2026 Sport Zone</span>. Todos los derechos reservados. Estética Dark Luxury.</p>
    </footer>

    <!-- Glow Interaction Cursor JS -->
    <script>
        // Soft Glow Cursor Effect
        document.body.addEventListener('mousemove', (e) => {
            const cursorGlow = document.createElement('div');
            cursorGlow.style.position = 'fixed';
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
            cursorGlow.style.width = '50px';
            cursorGlow.style.height = '50px';
            cursorGlow.style.background = 'rgba(0, 255, 163, 0.1)';
            cursorGlow.style.borderRadius = '50%';
            cursorGlow.style.boxShadow = '0 0 40px 20px rgba(0, 255, 163, 0.2)';
            cursorGlow.style.filter = 'blur(10px)';
            cursorGlow.style.transform = 'translate(-50%, -50%)';
            cursorGlow.style.pointerEvents = 'none';
            cursorGlow.style.zIndex = '9999';
            cursorGlow.style.transition = 'opacity 0.8s ease-out, transform 0.8s ease-out';
            cursorGlow.style.opacity = '1';
            
            document.body.appendChild(cursorGlow);
            
            setTimeout(() => {
                cursorGlow.style.opacity = '0';
                cursorGlow.style.transform = 'translate(-50%, -50%) scale(2)';
            }, 10);
            
            setTimeout(() => {
                if (document.body.contains(cursorGlow)) {
                    document.body.removeChild(cursorGlow);
                }
            }, 800);
        });

        // Click Pulse Effect
        document.body.addEventListener('mousedown', (e) => {
            const pulse = document.createElement('div');
            pulse.style.position = 'fixed';
            pulse.style.left = e.clientX + 'px';
            pulse.style.top = e.clientY + 'px';
            pulse.style.width = '100px';
            pulse.style.height = '100px';
            pulse.style.background = 'rgba(0, 255, 163, 0.4)';
            pulse.style.borderRadius = '50%';
            pulse.style.filter = 'blur(15px)';
            pulse.style.transform = 'translate(-50%, -50%) scale(0.5)';
            pulse.style.pointerEvents = 'none';
            pulse.style.zIndex = '10000';
            pulse.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
            pulse.style.opacity = '1';
            
            document.body.appendChild(pulse);
            
            setTimeout(() => {
                pulse.style.transform = 'translate(-50%, -50%) scale(2.5)';
                pulse.style.opacity = '0';
            }, 10);
            
            setTimeout(() => {
                if (document.body.contains(pulse)) {
                    document.body.removeChild(pulse);
                }
            }, 400);
        });

        // Scroll Reveal Activation
        document.addEventListener("DOMContentLoaded", () => {
            const reveals = document.querySelectorAll('.reveal, .glass, .hero');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if(entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });
            
            reveals.forEach(el => {
                if(!el.classList.contains('reveal')) {
                    el.classList.add('reveal');
                }
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
